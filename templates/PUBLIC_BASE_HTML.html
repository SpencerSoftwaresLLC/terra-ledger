<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "TerraLedger" }}</title>

    <style>
        :root {
            --bg: #0f1720;
            --bg-deep: #0a1118;
            --panel: #1b2c38;
            --panel-soft: #223746;
            --border: #314756;
            --text: #f7f3ea;
            --text-soft: #d6c2a8;

            --green: #6bbf72;
            --green-soft: #8fd59a;

            --orange: #f08c4a;
            --orange-soft: #ffb06b;

            --input-bg: #182833;
            --white-card: #ffffff;
            --white-border: #e5e7eb;
            --white-text: #0f172a;
            --white-muted: #475569;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            min-height: 100%;
            font-family: Arial, sans-serif;
            background:
                radial-gradient(circle at bottom left, rgba(107, 191, 114, 0.28), transparent 28%),
                radial-gradient(circle at top right, rgba(90, 162, 214, 0.18), transparent 30%),
                linear-gradient(180deg, var(--bg), var(--bg-deep));
            color: var(--text);
        }

        body {
            min-height: 100vh;
        }

        .public-header {
            height: 74px;
            display: flex;
            align-items: center;
            padding: 0 28px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            background: rgba(10, 17, 24, 0.35);
            backdrop-filter: blur(4px);
        }

        .public-brand {
            font-size: 24px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: 0.2px;
        }

        .page-content-wrap {
            min-height: calc(100vh - 74px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 36px 18px;
        }

        .page-content-inner {
            width: 100%;
            max-width: 520px;
        }

        .card {
            position: relative;
            background: var(--white-card);
            color: var(--white-text);
            border: 1px solid var(--white-border);
            border-radius: 22px;
            padding: 30px;
            box-shadow:
                0 25px 60px rgba(0, 0, 0, 0.30),
                0 0 0 1px rgba(255,255,255,0.04);
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 22px;
            pointer-events: none;
            box-shadow: 0 0 70px rgba(107,191,114,0.10);
        }

        .card h1 {
            margin: 0 0 10px 0;
            font-size: 34px;
            line-height: 1.1;
            color: var(--white-text);
        }

        .muted {
            color: var(--white-muted);
        }

        .grid {
            display: grid;
            gap: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 700;
            color: #334155;
        }

        input,
        select,
        textarea {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #cbd5e1;
            background: #ffffff;
            color: var(--white-text);
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 15px;
            transition: border-color .15s ease, box-shadow .15s ease;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--green);
            box-shadow: 0 0 0 4px rgba(107,191,114,0.18);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-width: 120px;
            padding: 12px 16px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--green), var(--green-soft));
            color: #0d1720;
            font-weight: 800;
            font-size: 15px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 12px 28px rgba(107,191,114,0.22);
            transition: transform .12s ease, opacity .12s ease;
        }

        .btn:hover {
            opacity: 0.96;
            transform: translateY(-1px);
        }

        .btn.secondary {
            background: #e2e8f0;
            color: #0f172a;
            border: 1px solid #cbd5e1;
            box-shadow: none;
        }

        .btn.secondary:hover {
            background: #dbe4ee;
            opacity: 1;
        }

        .flash-wrap {
            width: 100%;
            max-width: 520px;
            margin: 18px auto 0 auto;
            padding: 0 18px;
        }

        .flash {
            background: rgba(107,191,114,0.16);
            border: 1px solid rgba(107,191,114,0.35);
            color: var(--text);
            border-radius: 14px;
            padding: 12px 14px;
            margin-bottom: 12px;
            backdrop-filter: blur(2px);
        }

        .auth-badge {
            display: inline-block;
            margin-bottom: 14px;
            padding: 7px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: #7c2d12;
            background: #ffedd5;
            border: 1px solid #fed7aa;
        }

        .auth-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 22px;
        }

        @media (max-width: 640px) {
            .public-header {
                padding: 0 18px;
            }

            .public-brand {
                font-size: 22px;
            }

            .page-content-wrap {
                padding: 24px 14px;
            }

            .card {
                padding: 22px;
                border-radius: 18px;
            }

            .card h1 {
                font-size: 30px;
            }

            .auth-actions {
                flex-direction: column;
            }

            .auth-actions .btn,
            .auth-actions .btn.secondary {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <header class="public-header">
        <div class="public-brand">TerraLedger<sup style="font-size: 11px;">™</sup></div>
    </header>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="flash-wrap">
                {% for message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    {{ content|safe }}

</body>
</html>
