<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "TerraLedger" }}</title>

    <style>
        :root {
            --bg: #0f1720;
            --bg-deep: #0a1118;
            --text: #f7f3ea;
            --text-soft: #d6c2a8;
            --green: #6bbf72;
            --green-soft: #8fd59a;
            --orange: #f08c4a;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            min-height: 100%;
        }

        body {
            font-family: Arial, sans-serif;
            background:
                radial-gradient(circle at bottom left, rgba(107, 191, 114, 0.28), transparent 28%),
                radial-gradient(circle at top right, rgba(90, 162, 214, 0.18), transparent 30%),
                linear-gradient(180deg, var(--bg), var(--bg-deep));
            color: var(--text);
            min-height: 100vh;
        }

        .public-header {
            height: 74px;
            display: flex;
            align-items: center;
            padding: 0 28px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            background: rgba(10, 17, 24, 0.35);
            backdrop-filter: blur(4px);
        }

        .public-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: 0.2px;
        }

        .public-brand img {
            width: 36px;
            height: 36px;
            object-fit: contain;
            border-radius: 8px;
            background: rgba(255,255,255,0.08);
            padding: 3px;
        }

        .flash-wrap {
            width: 100%;
            max-width: 560px;
            margin: 18px auto 0 auto;
            padding: 0 18px;
        }

        .flash {
            background: rgba(107,191,114,0.16);
            border: 1px solid rgba(107,191,114,0.35);
            color: var(--text);
            border-radius: 14px;
            padding: 12px 14px;
            margin-bottom: 12px;
            backdrop-filter: blur(2px);
            font-weight: 600;
        }

        .page-content-wrap {
            min-height: calc(100vh - 74px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 36px 18px;
        }

        .page-content-inner {
            width: 100%;
            max-width: 560px;
        }

        @media (max-width: 640px) {
            .public-header {
                padding: 0 18px;
            }

            .public-brand {
                font-size: 22px;
            }

            .public-brand img {
                width: 32px;
                height: 32px;
            }

            .page-content-wrap {
                padding: 24px 14px;
            }
        }
    </style>
</head>
<body>

    <header class="public-header">
        <div class="public-brand">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="TerraLedger Logo">
            <span>TerraLedger<sup style="font-size: 11px;">™</sup></span>
        </div>
    </header>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="flash-wrap">
                {% for message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    {{ content|safe }}

</body>
</html>
