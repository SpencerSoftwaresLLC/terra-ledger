<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "TerraLedger" }}</title>

    <style>
        :root {
            --bg: #f7f7f5;
            --bg-soft: #eef3ea;
            --panel: #ffffff;
            --panel-soft: #e8f2e4;
            --border: #d8e2d0;

            --text: #1f2933;
            --text-soft: #5b6470;

            --green-dark: #2f4f1f;
            --green: #4f7f2b;
            --green-light: #7fbf3f;

            --brown: #6b4f2a;
            --brown-dark: #4a3720;

            --orange: #f08c4a;
            --orange-soft: #ffb06b;

            --danger: #b42318;
            --warning: #b7791f;
            --success: #3f6b24;

            --shadow: 0 12px 34px rgba(47, 79, 31, 0.10);
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            min-height: 100%;
        }

        body {
            font-family: Arial, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(127, 191, 63, 0.18), transparent 35%),
                radial-gradient(circle at bottom right, rgba(240, 140, 74, 0.16), transparent 30%),
                linear-gradient(135deg, #eef3ea 0%, #f7f7f5 45%, #f3ece4 100%);
            color: var(--text);
            min-height: 100vh;
        }

        .public-header {
            height: 74px;
            display: flex;
            align-items: center;
            padding: 0 28px;
            border-bottom: 1px solid rgba(47, 79, 31, 0.10);
            background: rgba(255,255,255,0.72);
            backdrop-filter: blur(6px);
        }

        .public-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: 800;
            color: var(--green-dark);
            letter-spacing: 0.2px;
        }

        .public-brand img {
            width: 38px;
            height: 38px;
            object-fit: contain;
            border-radius: 8px;
            background: rgba(255,255,255,0.85);
            padding: 3px;
            border: 1px solid rgba(47,79,31,0.08);
        }

        .flash-wrap {
            width: 100%;
            max-width: 560px;
            margin: 18px auto 0 auto;
            padding: 0 18px;
        }

        .flash {
            background: #edf6e8;
            border: 1px solid #cfe2c1;
            color: var(--green-dark);
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .page-content-wrap {
            min-height: calc(100vh - 74px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 36px 18px;
        }

        .page-content-inner {
            width: 100%;
            max-width: 560px;
        }

        /* =========================================
           🔥 GLOBAL BUTTON FIX (ALL PAGES)
           ========================================= */

        .btn {
            padding: 10px 14px;
            font-size: 14px;
            border-radius: 10px;
        }

        .btn.small {
            padding: 8px 12px;
            font-size: 13px;
        }

        /* MOBILE FIX */
        @media (max-width: 640px) {

            .public-header {
                padding: 0 18px;
            }

            .public-brand {
                font-size: 22px;
            }

            .public-brand img {
                width: 34px;
                height: 34px;
            }

            .page-content-wrap {
                padding: 24px 14px;
            }

            /* 🔥 THIS FIXES YOUR ISSUE */
            .btn,
            button,
            input[type="submit"] {
                padding: 6px 10px !important;
                font-size: 0.82rem !important;
                line-height: 1.2 !important;
                border-radius: 8px !important;
                min-height: auto !important;
            }

            .btn.small {
                padding: 5px 8px !important;
                font-size: 0.75rem !important;
            }
        }
    </style>
</head>
<body>

    <header class="public-header">
        <div class="public-brand">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="TerraLedger Logo">
            <span>TerraLedger<sup style="font-size:11px;">™</sup></span>
        </div>
    </header>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="flash-wrap">
                {% for message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    {{ content|safe }}

</body>
</html>
