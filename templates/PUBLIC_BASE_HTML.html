<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "TerraLedger" }}</title>

    <style>
        :root {
            --bg: #0d1720;
            --panel: #1b2c38;
            --panel-soft: #223746;
            --border: #314756;
            --text: #f7f3ea;
            --muted: #d6c2a8;

            --green: #6bbf72;
            --green-soft: #8fd59a;

            --orange: #f08c4a;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, var(--bg), #081017);
            color: var(--text);
        }

        /* TOP BAR */
        .topbar {
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .brand {
            font-size: 24px;
            font-weight: 800;
        }

        .nav a {
            color: var(--muted);
            margin-left: 14px;
            text-decoration: none;
            font-weight: 600;
            padding: 6px 10px;
            border-radius: 8px;
        }

        .nav a:hover {
            background: rgba(255,255,255,0.05);
        }

        /* CENTER CONTENT */
        .page-content-wrap {
            min-height: calc(100vh - 70px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 16px;
        }

        .page-content-inner {
            width: 100%;
            max-width: 460px;
        }

        /* CARD */
        .card {
            background: linear-gradient(180deg, var(--panel), var(--panel-soft));
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            position: relative;
        }

        .card h1 {
            margin: 0 0 10px;
            font-size: 32px;
        }

        .muted {
            color: var(--muted);
        }

        /* INPUTS */
        input {
            width: 100%;
            border: 1px solid var(--border);
            background: #182833;
            color: var(--text);
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 15px;
        }

        input:focus {
            outline: none;
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(107,191,114,0.25);
        }

        label {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            display: block;
        }

        .grid {
            display: grid;
            gap: 16px;
        }

        /* BUTTONS (GREEN PRIMARY) */
        .btn {
            background: linear-gradient(135deg, var(--green), var(--green-soft));
            color: #0d1720;
            border: none;
            padding: 12px 16px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(107,191,114,0.25);
        }

        .btn:hover {
            opacity: 0.95;
        }

        .btn.secondary {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn.secondary:hover {
            background: rgba(255,255,255,0.05);
        }

        /* FLASH */
        .flash {
            background: rgba(107,191,114,0.15);
            border: 1px solid rgba(107,191,114,0.3);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 16px;
            color: var(--text);
        }

        /* GREEN GLOW EFFECT */
        .card::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 22px;
            pointer-events: none;
            box-shadow: 0 0 60px rgba(107,191,114,0.08);
        }

        /* SUBTLE ACCENT LINE */
        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            border-radius: 22px 22px 0 0;
            background: linear-gradient(90deg, var(--green), var(--orange));
            opacity: 0.6;
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="brand">TerraLedger™</div>

        <div class="nav">
            <a href="{{ url_for('auth.login') }}">Login</a>
            <a href="{{ url_for('auth.register') }}">Register</a>
        </div>
    </div>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div style="max-width:460px; margin:20px auto;">
                {% for message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    {{ content|safe }}

</body>
</html>
