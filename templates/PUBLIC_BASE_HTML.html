<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "TerraLedger" }}</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #f8fafc, #eef2f7);
            color: #0f172a;
        }

        .topbar {
            background: #0f172a;
            color: white;
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-size: 22px;
            font-weight: 800;
        }

        .nav a {
            color: #e2e8f0;
            margin-left: 12px;
            text-decoration: none;
            font-weight: 600;
        }

        .nav a:hover {
            text-decoration: underline;
        }

        .flash {
            background: #fff7ed;
            border: 1px solid #fed7aa;
            padding: 12px;
            margin: 20px auto;
            max-width: 500px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="brand">TerraLedger</div>

        <div class="nav">
            <a href="{{ url_for('auth.login') }}">Login</a>
            <a href="{{ url_for('auth.register') }}">Register</a>
        </div>
    </div>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="flash">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {{ content|safe }}

</body>
</html>
